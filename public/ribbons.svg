<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(235,100,120,0.5);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(235,100,120,0.1);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(235,100,120,0.5);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(235,100,120,0.1);stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <!-- Left Ribbon Group -->
  <g filter="url(#blur)">
    <path d="M -50 100 C 200 300, 150 700, -100 900" fill="none" stroke="url(#grad1)" stroke-width="60" stroke-linecap="round" />
    <path d="M -100 250 C 150 450, 250 800, -50 1100" fill="none" stroke="url(#grad1)" stroke-width="80" stroke-linecap="round" />
    <path d="M -20 400 C 200 600, 100 900, -100 1200" fill="none" stroke="url(#grad1)" stroke-width="50" stroke-linecap="round" />
    
    <path d="M -80 150 Q 180 350, 100 550 T -100 950" fill="none" stroke="url(#grad1)" stroke-width="40" opacity="0.7" />
  </g>

  <!-- Right Ribbon Group -->
  <g filter="url(#blur)">
    <path d="M 110% 50 C 80% 250, 85% 650, 110% 850" fill="none" stroke="url(#grad2)" stroke-width="70" stroke-linecap="round" />
    <path d="M 105% 300 C 70% 500, 75% 900, 110% 1100" fill="none" stroke="url(#grad2)" stroke-width="90" stroke-linecap="round" />
    <path d="M 115% 500 C 80% 700, 90% 1000, 105% 1200" fill="none" stroke="url(#grad2)" stroke-width="50" stroke-linecap="round" />
    
    <path d="M 108% 200 Q 75% 400, 85% 600 T 110% 1000" fill="none" stroke="url(#grad2)" stroke-width="45" opacity="0.7" />
  </g>
</svg>
